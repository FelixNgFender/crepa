# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_language_version:
  python: "python3.13"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: sync-dotenv
        name: sync-dotenv
        language: system
        entry: sync-dotenv
        pass_filenames: false
        always_run: true
      - id: ruff-check
        name: ruff check
        entry: ruff check . --fix
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format
        entry: ruff format .
        language: system
        pass_filenames: false
        always_run: true
      - id: ty
        name: ty check
        entry: ty check .
        language: system
        pass_filenames: false
        always_run: true
